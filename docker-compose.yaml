version: '3.7'

networks:
  fabric-network:
    driver: bridge

volumes:
  couchdb0.org1-data:
  couchdb0.org2-data:

services:
  couchdb0.org1:
    image: couchdb:3.3.2
    container_name: couchdb0.org1
    ports:
      - "5984:5984"
    networks:
      - fabric-network
    volumes:
      - couchdb0.org1-data:/opt/couchdb/data

  couchdb0.org2:
    image: couchdb:3.3.2
    container_name: couchdb0.org2
    ports:
      - "6984:5984"
    networks:
      - fabric-network
    volumes:
      - couchdb0.org2-data:/opt/couchdb/data

  orderer.example.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.example.com
    hostname: orderer.example.com
    environment:
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/channel/genesis.block
    ports:
      - "7050:7050"
    networks:
      fabric-network:
        aliases:
          - orderer
    volumes:
      - ./organizations/ordererOrganizations/example.com/orderers/orderer.example.com/msp:/var/hyperledger/orderer/msp
      - ./organizations/ordererOrganizations/example.com/orderers/orderer.example.com/tls:/var/hyperledger/orderer/tls
      - ./channel-artifacts/genesis.block:/channel/genesis.block

  peer0.org1.example.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.org1.example.com
    hostname: peer0.org1.example.com
    environment:
      - CORE_PEER_ID=peer0.org1.example.com
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.example.com:7051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.example.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/var/hyperledger/peer/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0.org1:5984
      - CORE_PEER_TLS_ENABLED=false
    ports:
      - "7051:7051"
      - "7052:7052"
    networks:
      - fabric-network
    depends_on:
      - couchdb0.org1
      - orderer.example.com
    volumes:
      - ./organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/msp:/var/hyperledger/peer/msp
      - ./organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls:/var/hyperledger/peer/tls
      - ./core.yaml:/etc/hyperledger/fabric/core.yaml

  peer0.org2.example.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.org2.example.com
    hostname: peer0.org2.example.com
    environment:
      - CORE_PEER_ID=peer0.org2.example.com
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org2.example.com:9051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org2.example.com:9051
      - CORE_PEER_LOCALMSPID=Org2MSP
      - CORE_PEER_MSPCONFIGPATH=/var/hyperledger/peer/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0.org2:5984
      - CORE_PEER_TLS_ENABLED=false
    ports:
      - "9051:7051"
      - "9052:7052"
    networks:
      - fabric-network
    depends_on:
      - couchdb0.org2
      - orderer.example.com
    volumes:
      - ./organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/msp:/var/hyperledger/peer/msp
      - ./organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/tls:/var/hyperledger/peer/tls
      - ./core.yaml:/etc/hyperledger/fabric/core.yaml

  cli:
    image: hyperledger/fabric-tools:2.5
    container_name: cli
    tty: true
    stdin_open: true
    networks:
      - fabric-network
    depends_on:
      - peer0.org1.example.com
      - peer0.org2.example.com
    volumes:
      - ./organizations:/etc/hyperledger/fabric/organizations
      - ./channel-artifacts:/channel
      - ./chaincode:/opt/chaincode
